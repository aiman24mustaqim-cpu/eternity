version: '3.8'
services:
  mongodb:
    image: mongo:7
    restart: unless-stopped
    ports: ['27017:27017']
    volumes: [mongo_data:/data/db]
    environment:
      MONGO_INITDB_DATABASE: eternity

  backend:
    build: ./backend
    restart: unless-stopped
    ports: ['5000:5000']
    env_file: ./backend/.env
    depends_on: [mongodb]
    environment:
      MONGODB_URI: mongodb://mongodb:27017/eternity

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports: ['3000:3000']
    env_file: ./frontend/.env.local
    depends_on: [backend]
    environment:
      NEXT_PUBLIC_API_URL: http://backend:5000/api

volumes:
  mongo_data: